name: rust-web-fullstack

services:
  postgres:
    image: postgres:17.6-alpine@sha256:ef257d85f76e48da1c64832459b59fcaba1a4dac97bf5d7450c77753542eee94
    container_name: rwf-postgres
    environment:
      POSTGRES_USER: rwf
      POSTGRES_PASSWORD: rwf_dev_password
      POSTGRES_DB: rwf_demo
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements"]
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rwf -d rwf_demo"]
      interval: 5s
      timeout: 3s
      retries: 10

  live-search:
    build:
      context: .
      dockerfile: live-search.Dockerfile
    container_name: rwf-live-search
    env_file: .env
    environment:
      DATABASE_URL: postgres://rwf:rwf_dev_password@postgres:5432/rwf_demo
      RUST_LOG: info
      SCCACHE_DIR: /var/cache/sccache
    ports:
      - "3000:3000"
    volumes:
      - sccache-data:/var/cache/sccache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy

  i18n-demo:
    build:
      context: .
      dockerfile: i18n-demo.Dockerfile
    container_name: rwf-i18n-demo
    environment:
      PORT: 3002
      RUST_LOG: info
      SCCACHE_DIR: /var/cache/sccache
    ports:
      - "3002:3002"
    volumes:
      - sccache-data:/var/cache/sccache
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3002/"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: gateway.Dockerfile
    container_name: rwf-gateway
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      SCCACHE_DIR: /var/cache/sccache
    volumes:
      - sccache-data:/var/cache/sccache
    healthcheck:
      # Gateway exposes /health (aggregates service-module health).
      test: ["CMD", "curl", "-sf", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      live-search:
        condition: service_healthy

volumes:
  postgres-data:
  sccache-data:
